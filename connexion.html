<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — PageTurner</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>

  <header>
    <nav>
      <a href="index.html" class="nav-logo">Page<span>Turner</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="produits.html">Catalogue</a></li>
        <li><a href="commande.html">Mon Panier</a></li>
      </ul>
      <div class="nav-right">
        <a href="commande.html" class="cart-icon">🛒<span id="cart-count"></span></a>
        <div id="nav-auth"></div>
        <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
      </div>
    </nav>
  </header>

  <main class="page-form">
    <div class="form-card">
      <div class="form-logo">Page<span>Turner</span></div>
      <h1 class="form-title">Bon retour !</h1>
      <p class="form-subtitle">Connectez-vous à votre compte lecteur</p>

      <div class="alert alert-error" id="alert-error"></div>
      <div class="alert alert-success" id="alert-success"></div>

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="vous@email.com" autocomplete="email" />
        <span class="field-error" id="err-email">Adresse email invalide.</span>
      </div>

      <div class="form-group">
        <label for="motdepasse">Mot de passe</label>
        <input type="password" id="motdepasse" placeholder="Votre mot de passe" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') handleConnexion()" />
        <span class="field-error" id="err-motdepasse">Mot de passe requis.</span>
      </div>

      <button class="btn-form" onclick="handleConnexion()">Se connecter</button>

      <p class="form-footer">
        Pas encore de compte ? <a href="inscription.html">S'inscrire gratuitement</a>
      </p>

      <p style="text-align:center; margin-top:20px; font-size:0.8rem; color:var(--muted); border-top:1px solid var(--border); padding-top:16px;">
        Compte de démonstration :<br>
        <strong>admin@pageturner.dz</strong> / <strong>Admin123!</strong>
      </p>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="auth.js"></script>
  <script src="connexion.js"></script>
</body>
</html>
